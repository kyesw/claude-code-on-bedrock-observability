apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: otel-collectors
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: claude-code-observability
  annotations:
    # ── AWS ALB Ingress annotations ──
    # These are applied here for reference. If using AWS Load Balancer
    # Controller, move them to the Ingress resource instead.
    #
    # No sticky sessions needed — collectors are stateless passthrough.
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: otel-collector
  ports:
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
