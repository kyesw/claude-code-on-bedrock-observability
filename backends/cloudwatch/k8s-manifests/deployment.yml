apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: otel-collectors
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: claude-code-observability
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: claude-code-observability
    spec:
      serviceAccountName: otel-collector
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.149.0
          args:
            - --config=/etc/otelcol/config.yaml
          env:
            - name: AWS_REGION
              value: us-east-1    # ── EDIT THIS ──
          ports:
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: metrics
              containerPort: 8888
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
