worker_processes auto;

events {
    worker_connections 1024;
}

http {
    log_format upstream_log '$remote_addr - [$time_local] '
                            '"$request" $status '
                            'upstream=$upstream_addr';

    access_log /var/log/nginx/access.log upstream_log;

    upstream otel_collectors {
        # Round-robin by default — this is what causes the problem
        # with cumulative counters. Delta temporality makes it safe.
        server collector-1:4318;
        server collector-2:4318;
        server collector-3:4318;
    }

    server {
        listen 4318;

        location / {
            proxy_pass http://otel_collectors;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
        }
    }
}
